<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U+핫딜센터</title>
    <style>
        /* 기본 스타일 초기화 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; color: #333; background-color: #ffffff; }
        
        /* 전체 컨테이너 (화면 중앙 정렬 및 최대 너비 설정) */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        /* 메인 1페이지 (히어로 섹션) 영역 */
        .hero-section {
            padding: 80px 0; /* 상하 여백 */
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 50px;
        }

        /* 좌측 텍스트 영역 */
        .hero-text-box { flex: 1; }
        
        .hero-title {
            font-size: 40px;
            font-weight: 800;
            line-height: 1.3;
            letter-spacing: -1px;
            margin-bottom: 24px;
            word-break: keep-all;
        }
        .text-black { color: #000000; }
        .text-pink { color: #E6007E; font-size: 48px; } /* U+핫딜센터 글씨를 조금 더 크게 강조 */

        .hero-desc {
            font-size: 16px;
            line-height: 1.6;
            color: #555;
            margin-bottom: 40px;
            word-break: keep-all;
        }

        /* 버튼 그룹 */
        .button-group {
            display: flex;
            gap: 12px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 16px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px; /* 둥근 모서리 */
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.8; }
        
        .btn-kakao { background-color: #FEE500; color: #000000; }
        .btn-phone { background-color: #E6007E; color: #ffffff; }

        /* 우측 이미지 영역 */
        .hero-img-box {
            flex: 1;
            max-width: 550px; /* 이미지 최대 크기 제한 */
            position: relative;
        }
        .hero-img-box img {
            width: 100%;
            height: auto;
            border-radius: 24px; /* 레퍼런스처럼 둥근 테두리 적용 */
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); /* 부드러운 그림자 효과 */
            display: block;
        }

        /* ▼ 모바일 화면용 최적화 (화면 너비 768px 이하일 때) ▼ */
        @media (max-width: 768px) {
            .hero-section {
                flex-direction: column; /* 세로로 배치 */
                padding: 40px 0;
                text-align: center; /* 모바일에서는 가운데 정렬 */
                gap: 30px;
            }
            .hero-title { font-size: 28px; }
            .text-pink { font-size: 34px; }
            .hero-desc { font-size: 15px; }
            
            .button-group {
                flex-direction: column; /* 모바일에서는 버튼을 위아래로 배치 */
                width: 100%;
            }
            .btn { width: 100%; } /* 모바일에서 버튼이 꽉 차게 */
        }
    </style>
</head>
<body>

    <section class="hero-section container">
        
        <div class="hero-text-box">
            <h1 class="hero-title">
                <span class="text-black">LG유플러스 공식인증 온라인 스토어</span><br>
                <span class="text-pink">U+핫딜센터</span>
            </h1>
            <p class="hero-desc">
                U+ 핫딜센터는 LG유플러스 본사 직영으로 운영되는 기업형 통신 대리점입니다.<br>
                서울&경기 지역에 총 22개 직영 매장을 운영하고 있으며, 오랜 경험과 전문성을 바탕으로 고객님께 가장 합리적이고 투명한 정보를 제공합니다.
            </p>
            <div class="button-group">
                <a href="http://pf.kakao.com/_xlyGxin/chat" class="btn btn-kakao" target="_blank">💬 카카오톡 상담하기</a>
                <a href="tel:010-7774-0184" class="btn btn-phone">📞 전화 상담</a>
            </div>
        </div>

        <div class="hero-img-box">
            <img src="https://via.placeholder.com/600x400/eeeeee/999999?text=Store+Image+Here" alt="U+핫딜센터 매장 전경">
        </div>

    </section>
    </body>
</html>
